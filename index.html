<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abhishek A. Kadam | Organic Chemist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #111110;
      --dark: #111110;      /* Changed to deep black for description text */
      --mid: #111110;       /* Changed to deep black for description text */
      --muted: #6b6860;     /* Darkened slightly for better readability while keeping structure */
      --rule: #d8d5cf;
      --bg: #faf9f7;
      --bg2: #f2f0ec;
      --accent: #111110;
      --link: #2a5f8f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: "Avenir Next", "Nunito Sans", "Avenir", sans-serif;
      background: var(--bg);
      color: var(--dark);
      font-size: 16px;
      line-height: 1.75;
      font-weight: 400;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(250,249,247,0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
      height: 56px;
      display: flex; align-items: center;
      padding: 0 4rem;
      justify-content: space-between;
    }
    .nav-logo {
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--black);
    }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      text-decoration: none;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--black); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      padding: 56px 0 0;
      display: flex; align-items: center;
      background: var(--bg);
    }
    .hero-inner {
      max-width: 1060px; margin: 0 auto; padding: 0 4rem;
      width: 100%;
      display: grid; grid-template-columns: 1fr 1fr; gap: 0; align-items: end;
      padding-bottom: 5rem;
    }
    .hero-left { padding-right: 4rem; border-right: 1px solid var(--rule); }
    .hero-initial {
      font-size: clamp(100px, 18vw, 160px);
      font-weight: 300;
      color: var(--rule);
      line-height: 0.85;
      letter-spacing: -4px;
      margin-bottom: 1.5rem;
      user-select: none;
    }
    .hero-name {
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--black);
      line-height: 1.15;
      margin-bottom: 0.6rem;
    }
    .hero-rule {
      width: 36px; height: 1.5px;
      background: var(--black);
      margin: 1rem 0;
    }
    .hero-role {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }
    .hero-contact { display: flex; flex-direction: column; gap: 0.3rem; }
    .hero-contact a {
      font-size: 0.82rem; color: var(--muted); text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .hero-contact a:hover { color: var(--black); }

    .hero-right {
      padding-left: 4rem;
      display: flex; flex-direction: column; justify-content: flex-end;
      gap: 2.5rem;
    }
    .hero-summary {
      font-size: 1.175rem; /* Increased by 2 units (~0.125rem / 2px equivalent) */
      font-weight: 300;
      line-height: 1.85;
      color: var(--mid);
    }
    .hero-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--rule);
      padding-top: 2rem; gap: 0;
    }
    .stat { padding-right: 1.5rem; }
    .stat + .stat { border-left: 1px solid var(--rule); padding-left: 1.5rem; padding-right: 0; }
    .stat-num {
      font-size: 1.9rem; font-weight: 300; color: var(--black);
      line-height: 1; margin-bottom: 0.3rem; letter-spacing: -0.02em;
    }
    .stat-label {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted);
    }

    /* ── SECTIONS ── */
    .section { padding: 7rem 0; border-top: 1px solid var(--rule); }
    .container { max-width: 1060px; margin: 0 auto; padding: 0 4rem; }
    .section-header {
      display: grid; grid-template-columns: 200px 1fr; gap: 4rem;
      margin-bottom: 4rem;
    }
    .section-tag {
      font-size: 0.93rem; /* Increased by 4 units (~0.25rem from 0.68rem) */
      font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted);
      padding-top: 0.3rem;
    }
    .section-title {
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 300; letter-spacing: -0.02em;
      color: var(--black); line-height: 1.2;
    }
    .section-body {
      display: grid; grid-template-columns: 200px 1fr; gap: 4rem;
    }

    /* ── ABOUT ── */
    .about-text p {
      font-size: 1.075rem; /* Increased by 2 units (~0.125rem from 0.95rem) */
      color: var(--dark);  /* Hard black color */
      line-height: 1.85; margin-bottom: 1.2rem;
      font-weight: 300;
    }
    .competencies { }
    .comp-label {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 1.2rem;
    }
    .comp-item {
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--rule);
      font-size: 0.85rem; color: var(--dark);
      display: flex; align-items: center; gap: 0.8rem;
    }
    .comp-item::before {
      content: '';
      display: inline-block; width: 4px; height: 4px;
      border-radius: 50%; background: var(--muted); flex-shrink: 0;
    }

    /* ── EXPERIENCE ── */
    .exp-list { display: flex; flex-direction: column; gap: 3.5rem; }
    .exp-item { display: grid; grid-template-columns: 200px 1fr; gap: 4rem; }
    .exp-date {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); padding-top: 0.2rem;
    }
    .exp-title {
      font-size: 1.1rem; font-weight: 600;
      color: var(--black); margin-bottom: 0.15rem;
    }
    .exp-org {
      font-size: 0.88rem; color: var(--black);
      margin-bottom: 0.25rem; font-weight: 400;
    }
    .exp-location {
      font-size: 0.78rem; color: var(--muted);
      margin-bottom: 1rem;
    }
    .exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .exp-bullets li {
      font-size: 0.88rem; color: var(--dark); /* Hard black color */
      padding-left: 1.2rem; position: relative;
      font-weight: 300; line-height: 1.7;
    }
    .exp-bullets li::before {
      content: '—'; position: absolute; left: 0; color: var(--rule);
    }

    /* ── LINKEDIN STYLE GROUPED EXPERIENCE ── */
    .ln-group {
      position: relative;
      padding-left: 1.5rem;
      border-left: 2px solid var(--rule);
      margin-left: 0.2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-top: 1rem;
    }
    .ln-group-item {
      position: relative;
    }
    .ln-group-item::before {
      content: '';
      position: absolute;
      left: calc(-1.5rem - 6px);
      top: 0.4rem;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--rule);
    }

    /* ── EDUCATION ── */
    .edu-list { display: flex; flex-direction: column; gap: 0; margin-top: 4rem; border-top: 1px solid var(--rule); }
    .edu-item {
      display: grid; grid-template-columns: 200px 1fr; gap: 4rem;
      padding: 1.8rem 0; border-bottom: 1px solid var(--rule);
      align-items: baseline;
    }
    .edu-year {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.12em; color: var(--muted);
    }
    .edu-degree {
      font-size: 0.95rem; font-weight: 600; color: var(--black);
      margin-bottom: 0.2rem;
    }
    .edu-school { font-size: 0.88rem; color: var(--black); font-weight: 400; }
    .edu-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
    .edu-thesis { font-size: 0.78rem; color: var(--dark); margin-top: 0.4rem; font-style: italic; font-weight: 300; }

    /* ── PUBLICATIONS ── */
    .pub-intro {
      font-size: 0.82rem; color: var(--muted);
      margin-bottom: 3rem; font-weight: 300;
    }
    .pub-intro a { color: var(--link); text-decoration: none; }
    .pub-list { display: flex; flex-direction: column; gap: 0; }
    .pub-item {
      display: grid; grid-template-columns: 80px 1fr;
      gap: 2rem; padding: 1.8rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .pub-year {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; color: var(--muted);
      padding-top: 0.2rem;
    }
    .pub-title {
      font-size: 0.95rem; font-weight: 600;
      color: var(--black); line-height: 1.45;
      margin-bottom: 0.35rem;
    }
    .pub-authors {
      font-size: 0.78rem; color: var(--dark); /* Hard black color */
      margin-bottom: 0.25rem; font-weight: 300;
    }
    .pub-journal {
      font-size: 0.78rem; color: var(--dark); /* Hard black color */
      font-style: italic;
    }
